<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>SuperEV · AI Ops for EV Fleets</title>

    <meta
        name="description"
        content="SuperEV is an AI-powered EV Fleet Operations platform for battery intelligence, predictive maintenance, supply chain monitoring, and carbon analytics.">

    <meta
        name="keywords"
        content="EV, Electric Vehicle, Battery, Fleet Management, AI, Supply Chain, Carbon Analytics">

    <meta name="author" content="SuperEV">

    <meta name="theme-color" content="#0B1210">

     <!-- Favicon -->
    <link rel="icon" href="/assets/favicon_io/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="/assets/favicon_io/apple-touch-icon.png">
    <link rel="manifest" href="/assets/favicon_io/site.webmanifest">

    <!-- Faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- New generated CSS (served from ./dist/):   -->
    <link rel="stylesheet" href="./dist/output.css">
    <!-- ========================================== -->

    <!-- Your custom styles -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center">
    <div
    class="auth-card
           relative
           rounded-[32px]
           w-full
           max-w-md
           mx-4
           px-10
           py-12
           text-center
           animate-fade-in
           border border-primary-500/20
           bg-surface-low/90
           backdrop-blur-2xl
           shadow-[0_0_80px_rgba(34,197,94,0.12)]">

        <!-- SuperEV Logo -->
        <div class="relative flex justify-center mb-8">

            <div
            class="absolute
            w-48
            h-48
            rounded-full
            bg-primary-500/10
            blur-3xl">
        </div>

        <img
        src="/assets/logo.png"
        alt="SuperEV Logo"
        class="relative w-44 h-auto object-contain"
        loading="eager"
        decoding="async"
    />

</div>

       <h1
       class="font-display
        text-5xl
        font-bold
        tracking-tight
        text-white">

            Super EV<span class="text-primary-400">

        </h1>

        <p
        class="mt-4
        text-lg
        text-white/70
        font-medium">
            AI Operations Platform for EV Fleets
    </p>

        <button
            id="auth-btn" type="button" aria-label="Sign in with OIDC"
            class="auth-btn
                    mt-8
                    mx-auto
                    flex
                    items-center
                    justify-center
                    gap-3

                    w-[85%]
                    h-16

                    rounded-2xl

                    bg-gradient-to-r
                    from-emerald-400
                    to-green-500

                    text-black
                    text-xl
                    font-semibold

                    shadow-lg
                    shadow-green-500/30

                    transition-all
                    duration-300

                    hover:scale-[1.02]
                    hover:shadow-green-500/60">

            <span class="material-symbols-outlined text-xl">
                login
            </span>

            Sign in with OIDC
        </button>

        <p class="text-text-muted text-xs mt-4">
            Demo - no real authentication
        </p>

        <div class="mt-8 flex items-center justify-center gap-2 text-sm text-white/60">
            <span class="material-symbols-outlined text-primary-400 text-base">
                verified_user
            </span>

            Enterprise-grade • Secure • OIDC
        </div>
        <!-- Demo Information -->
        <div class="mt-6 pt-6 border-t border-white/5">
            <p class="uppercase tracking-[0.3em] text-primary-400 text-[11px] font-semibold">
                DEMO MODE
            </p>

            <p class="mt-3 text-sm text-white/50">
                Authentication is simulated for demonstration purposes.
            </p>

        </div>

    </div>

</div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container" aria-live="polite"
    aria-atomic="true" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div id="sidebar-overlay" 
    class="sidebar-overlay fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden" >
    </div>

    <!-- DESKTOP SIDEBAR -->
    <nav
    id="desktop-sidebar"
    aria-label="Primary Navigation" 
    class="desktop-sidebar fixed left-0 top-0 h-screen z-50 flex flex-col bg-surface-low/95 backdrop-blur-xl border-r border-white/5 transition-all duration-300 w-[220px]">
        <div id="sidebar-content"></div>
    </nav>

    <!-- MOBILE NAV  -->
    <div id="mobile-nav" 
    class="mobile-nav fixed top-0 left-0 right-0 z-50 bg-surface-low/95 backdrop-blur-xl border-b border-white/5 px-3 py-2 items-center justify-between hidden"></div>

    <!-- MAIN -->
    <main id="main-content" role="main" 
    class="relative z-10 transition-all duration-300 lg:ml-[220px] h-screen overflow-y-auto bg-gradient-dark">
        <div class="max-w-[1440px] mx-auto px-4 md:px-6 lg:px-8 py-4 lg:py-6">
            <section id="dashboard-container" aria-live="polite"></section>
            <section id="battery"></section>
            <section id="supply" class="scroll-mt-16"></section>
            <section id="carbon" class="scroll-mt-16"></section>
            <footer class="text-center text-[10px] text-text-muted/30 mt-6 pt-4 border-t border-white/5">
                SuperEV · Powered by FastAPI
            </footer>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script defer src="js/utils.js"></script>
    <script defer src="js/api.js"></script>
    <script defer src="components/sidebar.js"></script>
    <script defer src="components/header.js"></script>
    <script defer src="components/kpi.js"></script>
    <script defer src="components/agents.js"></script>
    <script defer src="components/queue.js"></script>
    <script defer src="components/audit.js"></script>
    <script defer src="components/toast.js"></script>
    <script defer src="js/ui.js"></script>
    <script defer src="js/events.js"></script>
    <script defer src="js/app.js"></script>
</body>
</html>
